<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Workouts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --iron:#19191a;
    --iron-2:#232324;
    --plate:#eeece4;
    --plate-dim:#a6a49c;
    --steel:#5b7f9e;
    --brass:#b3925c;
    --line:#33332f;
    --done:#7a9b6e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--iron);color:var(--plate);font-family:'Space Mono',monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center;}

  main{width:100%; max-width:420px; padding:32px 20px;}

  .eyebrow{
    font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--brass); margin:0 0 6px; text-align:center;
  }
  h1{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:32px; letter-spacing:0.5px;
    margin:0 0 34px; text-transform:uppercase; text-align:center;
  }

  .card{
    display:block; background:var(--iron-2); border:1px solid var(--line); border-radius:6px;
    padding:22px 20px; margin-bottom:14px; text-decoration:none; color:var(--plate);
    position:relative; overflow:hidden;
  }
  .card:active{background:#2a2a2b;}
  .card-name{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:22px; letter-spacing:0.3px;
    text-transform:uppercase;
  }
  .card-sub{font-size:11px; color:var(--plate-dim); margin-top:4px; letter-spacing:0.3px;}
  .card-arrow{
    position:absolute; right:20px; top:50%; transform:translateY(-50%);
    font-size:20px; color:var(--plate-dim);
  }
  .card.jay{border-left:3px solid var(--steel);}
  .card.anne{border-left:3px solid var(--brass);}
</style>
</head>
<body>
<main>
  <p class="eyebrow">Full Body · 3x/Week</p>
  <h1>Workouts</h1>

  <a class="card jay" href="./jay/">
    <div class="card-name">Jay's Workouts</div>
    <div class="card-sub">Iron Ledger — squat / hinge / power</div>
    <span class="card-arrow">→</span>
  </a>

  <a class="card anne" href="./anne/">
    <div class="card-name">Anne's Workouts</div>
    <div class="card-sub">Foundations — beginner full body</div>
    <span class="card-arrow">→</span>
  </a>
</main>
</body>
</html>
