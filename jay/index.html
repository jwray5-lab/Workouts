<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>3-Day Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --iron:#19191a;
    --iron-2:#232324;
    --plate:#eeece4;
    --plate-dim:#a6a49c;
    --steel:#5b7f9e;
    --steel-dim:#3d566b;
    --brass:#b3925c;
    --line:#33332f;
    --done:#7a9b6e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--iron);color:var(--plate);font-family:'Space Mono',monospace;}

  header{
    padding:22px 18px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--iron); z-index:10;
  }
  .eyebrow{
    font-family:'Oswald',sans-serif;
    font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--brass); margin:0 0 4px;
  }
  h1{
    font-family:'Oswald',sans-serif; font-weight:700;
    font-size:26px; letter-spacing:0.5px; margin:0;
    text-transform:uppercase;
  }
  .sub{font-size:11px; color:var(--plate-dim); margin-top:4px;}

  nav{
    display:flex; gap:8px; padding:14px 18px 4px;
  }
  .daybtn{
    flex:1; background:var(--iron-2); border:1px solid var(--line);
    color:var(--plate-dim); font-family:'Oswald',sans-serif; font-weight:600;
    letter-spacing:1px; text-transform:uppercase; font-size:13px;
    padding:12px 4px; border-radius:3px; position:relative; overflow:hidden;
  }
  .daybtn .tag{display:block; font-size:9px; color:var(--plate-dim); font-family:'Space Mono',monospace; letter-spacing:0; margin-top:2px; text-transform:none;}
  .daybtn.active{background:var(--steel-dim); color:var(--plate); border-color:var(--steel);}
  .daybtn.active .tag{color:#cfe0ee;}

  main{padding:16px 14px 60px;}

  .exercise{
    background:var(--iron-2); border:1px solid var(--line);
    border-radius:4px; margin-bottom:12px; overflow:hidden;
  }
  .ex-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 14px 10px;
  }
  .ex-name{font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:0.3px;}
  .ex-target{font-size:10px; color:var(--brass); margin-top:3px;}
  .ex-howto{
    font-size:10px; color:var(--steel); margin-top:5px; text-decoration:none;
    display:inline-flex; align-items:center; gap:4px; letter-spacing:0.3px;
  }
  .ex-howto:active{opacity:0.6;}
  .ex-howto svg{flex-shrink:0;}
  .plates{display:flex; gap:3px;}
  .plate-dot{
    width:9px; height:9px; border-radius:50%;
    border:1.5px solid var(--plate-dim); background:transparent;
  }
  .plate-dot.filled{background:var(--done); border-color:var(--done);}

  .sets{padding:0 14px 12px;}
  .set-row{
    display:grid; grid-template-columns:26px 1fr 1fr 30px;
    gap:8px; align-items:center; padding:6px 0;
    border-top:1px solid var(--line);
  }
  .set-row:first-child{border-top:none;}
  .set-label{font-size:11px; color:var(--plate-dim);}
  .set-row input[type=number]{
    width:100%; background:var(--iron); border:1px solid var(--line);
    color:var(--plate); font-family:'Space Mono',monospace; font-size:14px;
    padding:8px 6px; border-radius:3px; text-align:center;
  }
  .set-row input[type=number]:focus{outline:none; border-color:var(--steel);}
  .unit{font-size:9px; color:var(--plate-dim); display:block; text-align:center; margin-top:2px;}
  .check{
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--plate-dim);
    background:transparent; color:transparent; font-size:14px; line-height:1;
  }
  .check.done{background:var(--done); border-color:var(--done); color:var(--iron);}

  .col-heads{
    display:grid; grid-template-columns:26px 1fr 1fr 30px; gap:8px;
    padding:0 14px 2px; font-size:9px; color:var(--plate-dim); text-transform:uppercase; letter-spacing:1px;
  }
  .col-heads span:nth-child(2), .col-heads span:nth-child(3){text-align:center;}

  .finisher{
    font-size:11px; color:var(--plate-dim); padding:12px 14px 14px; border-top:1px dashed var(--line);
  }
  .finisher b{color:var(--brass); font-family:'Oswald',sans-serif; letter-spacing:0.5px;}

  footer{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--iron); border-top:1px solid var(--line);
    padding:10px 14px; display:flex; gap:8px; align-items:center;
    justify-content:space-between;
  }
  .save-status{font-size:9px; color:var(--plate-dim); flex-shrink:0;}
  .footer-btns{display:flex; gap:8px;}
  .reset-btn, .history-btn, .save-btn{
    font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase;
    padding:10px 14px; border-radius:3px; border:1px solid var(--line);
  }
  .history-btn{background:transparent; color:var(--plate-dim);}
  .history-btn:active{background:var(--iron-2);}
  .save-btn{background:var(--done); color:var(--iron); border-color:var(--done); font-weight:600;}
  .save-btn:active{opacity:0.8;}

  .overlay{
    position:fixed; inset:0; background:var(--iron); z-index:50;
    display:none; flex-direction:column;
  }
  .overlay.open{display:flex;}
  .overlay-head{
    padding:20px 18px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .overlay-title{font-family:'Oswald',sans-serif; font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;}
  .overlay-close{
    background:var(--iron-2); border:1px solid var(--line); color:var(--plate);
    width:30px; height:30px; border-radius:50%; font-size:14px;
  }
  .overlay-body{padding:14px; overflow-y:auto; flex:1;}
  .hist-entry{
    background:var(--iron-2); border:1px solid var(--line); border-radius:4px;
    padding:12px 14px; margin-bottom:10px;
  }
  .hist-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .hist-day{font-family:'Oswald',sans-serif; font-weight:600; font-size:14px; letter-spacing:0.3px;}
  .hist-date{font-size:10px; color:var(--brass);}
  .hist-ex{font-size:11px; color:var(--plate-dim); padding:3px 0; border-top:1px solid var(--line);}
  .hist-ex:first-of-type{border-top:none;}
  .hist-ex b{color:var(--plate); font-weight:normal;}
  .hist-empty{color:var(--plate-dim); font-size:12px; text-align:center; padding:40px 20px;}
  .hist-del{
    background:transparent; border:none; color:var(--plate-dim); font-size:10px;
    text-decoration:underline; padding:0; margin-top:8px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Full Body · 3x/Week</p>
  <h1>Iron Ledger</h1>
  <p class="sub">Enter your sets, then tap Save Workout to log today and start fresh next time.</p>
</header>

<nav id="daynav"></nav>

<main id="main"></main>

<footer>
  <span class="save-status" id="saveStatus">Ready</span>
  <div class="footer-btns">
    <button class="history-btn" id="historyBtn">History</button>
    <button class="save-btn" id="saveWorkoutBtn">Save Workout</button>
  </div>
</footer>

<div class="overlay" id="historyOverlay">
  <div class="overlay-head">
    <span class="overlay-title">History</span>
    <button class="overlay-close" id="closeHistory">✕</button>
  </div>
  <div class="overlay-body" id="historyBody"></div>
</div>

<script>
const DAYS = {
  A: {
    label: "Day A",
    tag: "Squat Focus",
    finisher: "Finish: 10 min light cardio (bike / incline walk)",
    exercises: [
      { id:"a1", name:"Barbell Back Squat", target:"3 × 12", sets:3 },
      { id:"a2", name:"Bench Press", target:"3 × 12", sets:3 },
      { id:"a3", name:"Cable Row", target:"3 × 15", sets:3 },
      { id:"a4", name:"DB Shoulder Press", target:"3 × 12", sets:3 },
      { id:"a5", name:"Cable Curl", target:"2 × 15", sets:2 },
      { id:"a6", name:"Plank", target:"3 × 30–45 sec", sets:3 },
    ]
  },
  B: {
    label: "Day B",
    tag: "Hinge Focus",
    finisher: "Finish: 10 min light cardio (bike / incline walk)",
    exercises: [
      { id:"b1", name:"Romanian Deadlift", target:"3 × 12", sets:3 },
      { id:"b2", name:"DB Incline Press", target:"3 × 12", sets:3 },
      { id:"b3", name:"Lat Pulldown", target:"3 × 15", sets:3 },
      { id:"b4", name:"Walking Lunges", target:"3 × 12/leg", sets:3 },
      { id:"b5", name:"Tricep Pushdown", target:"2 × 15", sets:2 },
      { id:"b6", name:"Side Plank", target:"3 × 30 sec/side", sets:3 },
    ]
  },
  C: {
    label: "Day C",
    tag: "Power / Accessory",
    finisher: "Finish: core circuit + 10 min cardio",
    exercises: [
      { id:"c1", name:"DB / Cable Shoulder Press", target:"3 × 12", sets:3 },
      { id:"c2", name:"Deadlift (light-mod)", target:"3 × 8", sets:3 },
      { id:"c3", name:"Cable Fly", target:"3 × 15", sets:3 },
      { id:"c4", name:"Face Pull", target:"3 × 15", sets:3 },
      { id:"c5", name:"Goblet Squat", target:"3 × 15", sets:3 },
      { id:"c6", name:"Cable Crunch", target:"3 × 15", sets:3 },
    ]
  }
};

function howtoUrl(name){
  const q = encodeURIComponent(name + " proper form tutorial");
  return `https://www.youtube.com/results?search_query=${q}`;
}

let currentDay = "A";
let data = {}; // data[dayKey][exId] = [{w,r,done}, ...]

const saveStatus = document.getElementById('saveStatus');
const STORAGE_KEY = 'iron-ledger-data';
const HISTORY_KEY = 'iron-ledger-history';
let history = [];

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ data = JSON.parse(raw); }
  }catch(e){ /* no saved data yet */ }
  ensureShape();
  try{
    const rawHist = localStorage.getItem(HISTORY_KEY);
    if(rawHist){ history = JSON.parse(rawHist); }
  }catch(e){ history = []; }
}

function ensureShape(){
  Object.keys(DAYS).forEach(dk=>{
    if(!data[dk]) data[dk] = {};
    DAYS[dk].exercises.forEach(ex=>{
      if(!data[dk][ex.id]){
        data[dk][ex.id] = Array.from({length: ex.sets}, ()=>({w:"", r:"", done:false}));
      }
    });
  });
}

let saveTimer = null;
function scheduleSave(){
  saveStatus.textContent = "Saving…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      saveStatus.textContent = "Saved";
    }catch(e){
      saveStatus.textContent = "Save failed";
    }
  }, 400);
}

function renderNav(){
  const nav = document.getElementById('daynav');
  nav.innerHTML = "";
  Object.keys(DAYS).forEach(dk=>{
    const btn = document.createElement('button');
    btn.className = 'daybtn' + (dk===currentDay ? ' active':'');
    btn.innerHTML = `${DAYS[dk].label}<span class="tag">${DAYS[dk].tag}</span>`;
    btn.onclick = ()=>{ currentDay = dk; renderNav(); renderMain(); };
    nav.appendChild(btn);
  });
}

function renderMain(){
  const main = document.getElementById('main');
  main.innerHTML = "";
  const day = DAYS[currentDay];

  day.exercises.forEach(ex=>{
    const wrap = document.createElement('div');
    wrap.className = 'exercise';

    const head = document.createElement('div');
    head.className = 'ex-head';
    const doneCount = data[currentDay][ex.id].filter(s=>s.done).length;
    head.innerHTML = `
      <div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-target">Target ${ex.target}</div>
        <a class="ex-howto" href="${howtoUrl(ex.name)}" target="_blank" rel="noopener">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
          How to do it
        </a>
      </div>
      <div class="plates">${data[currentDay][ex.id].map(s=>`<span class="plate-dot ${s.done?'filled':''}"></span>`).join('')}</div>
    `;
    wrap.appendChild(head);

    const colHeads = document.createElement('div');
    colHeads.className = 'col-heads';
    colHeads.innerHTML = `<span></span><span>Weight</span><span>Reps</span><span></span>`;
    wrap.appendChild(colHeads);

    const setsDiv = document.createElement('div');
    setsDiv.className = 'sets';

    data[currentDay][ex.id].forEach((s, i)=>{
      const row = document.createElement('div');
      row.className = 'set-row';

      const label = document.createElement('div');
      label.className = 'set-label';
      label.textContent = `${i+1}`;

      const wInput = document.createElement('input');
      wInput.type = 'number'; wInput.inputMode='decimal'; wInput.placeholder='lb';
      wInput.value = s.w;
      wInput.oninput = (e)=>{ s.w = e.target.value; scheduleSave(); };

      const rInput = document.createElement('input');
      rInput.type = 'number'; rInput.inputMode='numeric'; rInput.placeholder='reps';
      rInput.value = s.r;
      rInput.oninput = (e)=>{ s.r = e.target.value; scheduleSave(); };

      const check = document.createElement('button');
      check.className = 'check' + (s.done ? ' done':'');
      check.textContent = '✓';
      check.onclick = ()=>{
        s.done = !s.done;
        renderMain();
        scheduleSave();
      };

      row.appendChild(label);
      row.appendChild(wInput);
      row.appendChild(rInput);
      row.appendChild(check);
      setsDiv.appendChild(row);
    });

    wrap.appendChild(setsDiv);

    const fin = document.createElement('div');
    fin.className = 'finisher';
    fin.innerHTML = `<b>—</b> `;
    setsDiv.after(fin);

    main.appendChild(wrap);
  });

  const finisher = document.createElement('div');
  finisher.style.cssText = 'font-size:11px;color:var(--plate-dim);padding:10px 4px 30px;text-align:center;';
  finisher.innerHTML = day.finisher;
  main.appendChild(finisher);
}

function saveHistory(){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }catch(e){}
}

function renderHistory(){
  const body = document.getElementById('historyBody');
  body.innerHTML = "";
  if(history.length === 0){
    body.innerHTML = `<div class="hist-empty">No workouts saved yet.<br>Log a session and tap "Save Workout."</div>`;
    return;
  }
  history.forEach((entry, idx)=>{
    const card = document.createElement('div');
    card.className = 'hist-entry';
    const exLines = entry.exercises.map(ex=>{
      const setStr = ex.sets.map(s => (s.w||s.r) ? `${s.w||'–'}lb×${s.r||'–'}` : null).filter(Boolean).join(', ');
      if(!setStr) return '';
      return `<div class="hist-ex"><b>${ex.name}:</b> ${setStr}</div>`;
    }).filter(Boolean).join('');
    card.innerHTML = `
      <div class="hist-top">
        <span class="hist-day">${entry.dayLabel} · ${entry.tag}</span>
        <span class="hist-date">${entry.date}</span>
      </div>
      ${exLines || '<div class="hist-ex">No sets logged.</div>'}
      <button class="hist-del" data-idx="${idx}">Delete entry</button>
    `;
    body.appendChild(card);
  });
  body.querySelectorAll('.hist-del').forEach(btn=>{
    btn.onclick = ()=>{
      const i = parseInt(btn.dataset.idx, 10);
      history.splice(i, 1);
      saveHistory();
      renderHistory();
    };
  });
}

document.getElementById('saveWorkoutBtn').onclick = ()=>{
  const day = DAYS[currentDay];
  const exercises = day.exercises.map(ex=>({
    name: ex.name,
    sets: data[currentDay][ex.id].map(s=>({w:s.w, r:s.r}))
  }));
  const hasAnyData = exercises.some(ex => ex.sets.some(s => s.w || s.r));
  if(!hasAnyData){
    saveStatus.textContent = "Nothing to save";
    setTimeout(()=>{ saveStatus.textContent = "Ready"; }, 1500);
    return;
  }
  const today = new Date();
  const dateStr = today.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  history.unshift({
    date: dateStr,
    dayLabel: day.label,
    tag: day.tag,
    exercises
  });
  saveHistory();

  // clear current day back to blank for next time
  day.exercises.forEach(ex=>{
    data[currentDay][ex.id] = Array.from({length: ex.sets}, ()=>({w:"", r:"", done:false}));
  });
  scheduleSave();
  renderMain();
  saveStatus.textContent = "Workout saved!";
  setTimeout(()=>{ saveStatus.textContent = "Ready"; }, 2000);
};

document.getElementById('historyBtn').onclick = ()=>{
  renderHistory();
  document.getElementById('historyOverlay').classList.add('open');
};
document.getElementById('closeHistory').onclick = ()=>{
  document.getElementById('historyOverlay').classList.remove('open');
};

(async function init(){
  await loadData();
  renderNav();
  renderMain();
})();
</script>
</body>
</html>
